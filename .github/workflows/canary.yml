name: Canary

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish canary
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          git tag -f canary
          git push -f origin canary

          gh release delete canary --yes 2>/dev/null || true
          gh release create canary dist/*.tar.gz dist/checksums.txt \
            --title "Canary ($(git rev-parse --short HEAD))" \
            --notes "Latest build from \`main\` — commit $(git rev-parse --short HEAD). Not a stable release." \
            --prerelease \
            --target "$COMMIT_SHA"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
