name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      # v1 is a floating action branch (uses: codecanary@v1). Using a
      # branch instead of a tag keeps v1 out of the tag namespace so
      # GitHub's auto release notes only see semver tags. Only update
      # for v0.x/v1.x releases. When a v2 line ships, add a separate step.
      - name: Update v1 action branch
        if: startsWith(github.ref_name, 'v0.') || startsWith(github.ref_name, 'v1.')
        run: |
          git push origin "${{ github.sha }}:refs/heads/v1" --force
