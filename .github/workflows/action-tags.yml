name: Update action tags

on:
  push:
    branches: [main]
    paths: [action.yml]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-v1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Move v1 tag
        run: |
          git tag -f v1
          git push origin v1 --force
