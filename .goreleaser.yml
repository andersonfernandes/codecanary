version: 2

project_name: codecanary

before:
  hooks:
    - go mod tidy

builds:
  - id: codecanary
    main: ./cmd/review
    binary: codecanary
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version=v{{.Version}}

archives:
  - id: codecanary
    builds: [codecanary]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: alansikora
    name: codecanary
